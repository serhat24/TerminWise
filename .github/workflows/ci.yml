name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore TerminWise.slnx

      - name: Build
        run: dotnet build TerminWise.slnx -c Release --no-restore

      - name: Test
        run: dotnet test TerminWise.slnx -c Release --no-build --verbosity normal

  format:
    name: Format (editorconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Verify formatting
        run: dotnet format TerminWise.slnx --verify-no-changes
